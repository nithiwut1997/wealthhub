services:
  postgres:
    image: postgres:17
    container_name: wealthhub-postgres

    environment:
      POSTGRES_DB: wealthhub
      POSTGRES_USER: wealthhub
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: